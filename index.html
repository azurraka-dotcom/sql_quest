<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Quest: AI Mastery</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --neon-blue: #00f2ff; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(45deg, #06b6d4, #8b5cf6); transition: 0.3s; }
        .btn-primary:active { transform: scale(0.95); }
        .loader { width: 40px; height: 40px; border: 4px solid #1e293b; border-top: 4px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 1. SETUP SCREEN (API KEY) -->
    <div id="setup-screen" class="w-full max-w-md mt-10 glass p-8 rounded-3xl hidden">
        <h2 class="font-game text-2xl text-cyan-400 mb-6"><i class="fas fa-plug mr-2"></i>LINK AI CORE</h2>
        <input type="password" id="apiKeyInput" placeholder="Masukkan Gemini API Key..." class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 mb-6 text-white outline-none focus:border-cyan-400">
        <button onclick="saveApiKey()" class="w-full btn-primary p-4 rounded-xl font-bold uppercase">Connect System</button>
    </div>

    <!-- 2. HOME SCREEN -->
    <div id="home-screen" class="w-full max-w-md flex flex-col items-center">
        <div class="mt-8 mb-10 text-center">
            <h1 class="font-game text-3xl font-bold tracking-tighter">SQL <span class="text-cyan-400">QUEST</span></h1>
            <p class="text-[10px] tracking-[0.3em] text-slate-500 uppercase">Neural Network Edition</p>
        </div>

        <div class="w-full glass p-6 rounded-3xl mb-8">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Rank</p>
                    <h2 id="rank-display" class="font-game text-xl text-cyan-400">Loading...</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Total XP</p>
                    <h2 class="font-game text-xl" id="xp-display">0</h2>
                </div>
            </div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="xp-bar" class="bg-cyan-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>

        <button id="startBtn" onclick="startMission()" class="w-full btn-primary py-5 rounded-2xl font-game text-lg shadow-lg">
            START MISSION <i class="fas fa-chevron-right ml-2"></i>
        </button>

        <button onclick="resetApi()" class="mt-8 text-[10px] text-slate-500 uppercase tracking-widest hover:text-red-400">
            <i class="fas fa-sync-alt mr-1"></i> Reset API Key
        </button>

        <div id="loading" class="hidden flex-col items-center mt-8">
            <div class="loader mb-4"></div>
            <p class="font-game text-[10px] text-cyan-400 animate-pulse uppercase">Syncing with AI...</p>
        </div>
    </div>

    <!-- 3. GAMEPLAY SCREEN -->
    <div id="game-screen" class="w-full max-w-md hidden">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="font-game text-xs text-slate-500">QUEST: <span id="q-count" class="text-white">1/5</span></div>
            <div class="font-game text-xs text-slate-500">SCORE: <span id="session-score" class="text-cyan-400">0</span></div>
        </div>
        <div class="glass p-8 rounded-[2rem] border-t-4 border-cyan-500">
            <h2 id="q-text" class="text-lg font-semibold text-center mb-8">...</h2>
            <div id="options" class="grid gap-4"></div>
        </div>
    </div>

    <!-- 4. RESULT SCREEN -->
    <div id="summary-screen" class="w-full max-w-md hidden">
        <div class="glass p-8 rounded-[2rem] text-center">
            <h2 class="font-game text-2xl mb-2 text-cyan-400">MISSION COMPLETE</h2>
            <div class="text-5xl font-game my-6">+<span id="xp-gained">0</span> XP</div>
            <div id="ai-summary-box" class="text-left bg-slate-900/50 p-6 rounded-2xl border border-slate-700 hidden">
                <p id="ai-text" class="text-sm leading-relaxed text-slate-300"></p>
            </div>
            <button onclick="location.reload()" class="w-full mt-8 p-4 rounded-xl bg-slate-800 font-bold">BACK TO HUB</button>
        </div>
    </div>

    <script>
        // Data & State
        let apiKey = localStorage.getItem('gemini_api_key');
        let xp = parseInt(localStorage.getItem('sql_xp_v3')) || 0;
        let currentQuestions = [];
        let currentIdx = 0;
        let correctCount = 0;
        let wrongAnswers = [];

        const levels = [
            { name: "Novice", req: 0 },
            { name: "Junior", req: 1000 },
            { name: "Intermediate", req: 3000 },
            { name: "Advanced", req: 7000 },
            { name: "Architect", req: 15000 }
        ];

        // Inisialisasi Aplikasi
        window.onload = function() {
            if (!apiKey) {
                document.getElementById('setup-screen').classList.remove('hidden');
                document.getElementById('home-screen').classList.add('hidden');
            } else {
                renderDashboard();
            }
        };

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value.trim();
            if(val.length > 20) {
                localStorage.setItem('gemini_api_key', val);
                location.reload();
            } else { alert("API Key tidak valid!"); }
        }

        function resetApi() {
            if(confirm("Hapus API Key dan reset game?")) {
                localStorage.removeItem('gemini_api_key');
                location.reload();
            }
        }

        function renderDashboard() {
            let cur = levels[0], nxt = levels[1];
            for (let i = 0; i < levels.length; i++) {
                if (xp >= levels[i].req) {
                    cur = levels[i];
                    nxt = levels[i+1] || { name: "MAX", req: xp };
                }
            }
            document.getElementById('rank-display').innerText = cur.name.toUpperCase();
            document.getElementById('xp-display').innerText = xp;
            const progress = nxt.name === "MAX" ? 100 : ((xp - cur.req) / (nxt.req - cur.req)) * 100;
            document.getElementById('xp-bar').style.width = progress + "%";
        }

        async function startMission() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loading').classList.add('flex');
        
            const curLvl = document.getElementById('rank-display').innerText;
            
            const prompt = `Berikan 5 soal pilihan ganda SQL level ${curLvl} dalam Bahasa Indonesia. 
            Output WAJIB JSON array: [{"q":"...","opts":["...","...","...","..."],"a":0,"topic":"..."}]`;
        
            try {
                // PERUBAHAN: Menggunakan v1beta dengan format model yang lebih lengkap
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ text: prompt }] 
                        }],
                        // Tambahan Safety Settings agar AI tidak ragu menjawab soal teknis
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 2048,
                        }
                    })
                });
        
                const data = await res.json();
        
                if (data.error) {
                    // Jika masih gagal, kita coba ganti ke model 'gemini-pro' sebagai cadangan otomatis
                    if(data.error.message.includes("not found")) {
                        alert("Model Flash tidak ditemukan, mencoba mode stabil (Gemini Pro)...");
                        // Fungsi ini akan memanggil ulang dengan model berbeda jika kamu mau, 
                        // tapi sementara kita tampilkan error aslinya dulu untuk diagnosa.
                    }
                    alert("API ERROR: " + data.error.message);
                    location.reload();
                    return;
                }
        
                let text = data.candidates[0].content.parts[0].text;
                text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                
                currentQuestions = JSON.parse(text);
                
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                loadQuestion();
        
            } catch (e) {
                alert("SISTEM ERROR: " + e.message);
                location.reload();
            }
        }        
        
        function loadQuestion() {
            if (currentIdx >= 5) return finish();
            const q = currentQuestions[currentIdx];
            document.getElementById('q-count').innerText = (currentIdx + 1) + "/5";
            document.getElementById('q-text').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            q.opts.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 glass rounded-2xl text-left hover:bg-slate-800 transition border-l-4 border-transparent hover:border-cyan-400";
                b.innerText = o;
                b.onclick = () => answer(i);
                optDiv.appendChild(b);
            });
        }

        function answer(idx) {
            if (idx === currentQuestions[currentIdx].a) {
                correctCount++;
                document.getElementById('session-score').innerText = correctCount;
            } else {
                wrongAnswers.push(currentQuestions[currentIdx].topic);
            }
            currentIdx++;
            loadQuestion();
        }

        async function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
            const earned = correctCount * 200;
            xp += earned;
            localStorage.setItem('sql_xp_v3', xp);
            document.getElementById('xp-gained').innerText = earned;

            if (wrongAnswers.length > 0) {
                document.getElementById('ai-summary-box').classList.remove('hidden');
                document.getElementById('ai-text').innerText = "Kamu perlu belajar lagi di topik: " + [...new Set(wrongAnswers)].join(", ");
            }
        }
    </script>
</body>
</html>
