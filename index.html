<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Quest: Hardcoded Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-start { background: linear-gradient(45deg, #06b6d4, #8b5cf6); }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #06b6d4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div id="home-screen" class="w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-2">SQL QUEST</h1>
        <p class="text-xs text-slate-500 mb-8 uppercase tracking-widest">AI Hardcoded System</p>

        <div class="glass p-6 rounded-3xl mb-8 text-left">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Status Sistem</p>
            <h2 id="status-ai" class="text-cyan-400 font-bold text-lg text-green-400 italic">READY TO SYNC</h2>
        </div>

        <button id="startBtn" onclick="startMission()" class="w-full btn-start py-5 rounded-2xl font-bold text-lg shadow-lg">
            START MISSION
        </button>

        <div id="loading" class="hidden flex-col items-center mt-8">
            <div class="loader mb-4"></div>
            <p class="text-xs text-cyan-400 animate-pulse">MEMANGGIL AI CORE...</p>
        </div>
    </div>

    <div id="game-screen" class="w-full max-w-md hidden">
        <div class="glass p-8 rounded-[2rem]">
            <h2 id="q-text" class="text-lg font-semibold text-center mb-8">...</h2>
            <div id="options" class="grid gap-4"></div>
        </div>
    </div>

    <script>
        // API KEY HARDCODED
        const MY_API_KEY = "AIzaSyCzhdDfWFibqwoesMN8uDirtfT7EBhfLgo";
        let currentQuestions = [];
        let currentIdx = 0;
    
        async function startMission() {
            // Efek Visual Loading
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loading').classList.add('flex');
    
            const prompt = `Berikan 5 soal pilihan ganda SQL level Junior dalam Bahasa Indonesia. 
            Output WAJIB JSON array murni: [{"q":"soal","opts":["a","b","c","d"],"a":0}]`;
    
            try {
                // Jalur v1beta biasanya lebih fleksibel untuk model-model baru di berbagai region
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 1024,
                        }
                    })
                });
    
                const data = await response.json();
    
                // Diagnosa Error Langsung
                if (data.error) {
                    // Jika error 404 muncul lagi, kita berikan instruksi spesifik
                    if(data.error.code === 404) {
                        alert("ERROR 404: Google tidak menemukan model ini di regionmu. Coba aktifkan VPN (Singapura/USA) dan refresh halaman.");
                    } else {
                        alert("GOOGLE API ERROR: " + data.error.message);
                    }
                    location.reload();
                    return;
                }
    
                // Validasi Respon AI
                if (!data.candidates || data.candidates.length === 0) {
                    alert("AI tidak memberikan respon. Coba klik Start Mission lagi.");
                    location.reload();
                    return;
                }
    
                // Parsing Data
                let text = data.candidates[0].content.parts[0].text;
                text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                currentQuestions = JSON.parse(text);
                
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                renderQuestion();
    
            } catch (e) {
                alert("SISTEM ERROR: " + e.message);
                location.reload();
            }
        }
    
        function renderQuestion() {
            if (currentIdx >= 5) {
                alert("Misi Selesai! Kamu telah menyelesaikan tantangan SQL.");
                location.reload();
                return;
            }
            const q = currentQuestions[currentIdx];
            document.getElementById('q-text').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            q.opts.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 glass rounded-2xl text-left hover:bg-slate-800 transition border border-slate-700 active:bg-cyan-900";
                b.innerText = o;
                b.onclick = () => {
                    currentIdx++;
                    renderQuestion();
                };
                optDiv.appendChild(b);
            });
        }
    </script>
</body>
</html>
